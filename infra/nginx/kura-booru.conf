# =============================================================================
# Kura Booru v2 — Example nginx Configuration
# =============================================================================
# Replace "kura-booru.example.com" with your actual domain.
# Adjust SSL certificate paths to match your setup.
# =============================================================================

server {
    listen 443 ssl http2;
    server_name kura-booru.example.com;

    ssl_certificate     /etc/ssl/certs/your-cert.pem;
    ssl_certificate_key /etc/ssl/private/your-key.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE (web import progress)
        proxy_buffering off;
        proxy_cache off;

        client_max_body_size 50m;
    }

    # Static assets — long cache (hashed filenames)
    location ~* \.(js|css|woff2?|png|jpg|svg|ico|webp|avif)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
}
