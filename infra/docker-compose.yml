# =============================================================================
# Kura Booru Next — Production Docker Compose
# =============================================================================
# Minimal production configuration — no MinIO, no exposed ports.
# Caddy runs on the HOST machine and reverse-proxies into this Docker network.
#
# Usage:
#   docker compose -f infra/docker-compose.yml up -d
#
# Required environment variables (must be set in ../.env):
#   POSTGRES_PASSWORD — no default, will fail if not set
#   All other vars should be configured in .env (see .env.example)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend — FastAPI REST API
  # ---------------------------------------------------------------------------
  backend:
    image: kura-booru-next-backend:v0.6.0
    container_name: kura-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Worker — ARQ background task processor
  # ---------------------------------------------------------------------------
  worker:
    image: kura-booru-next-backend:v0.6.0
    container_name: kura-worker
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kura-internal
    command: ["arq", "app.tasks.worker.WorkerSettings"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://backend:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Bot — aiogram 3.x Telegram Bot (webhook mode)
  # ---------------------------------------------------------------------------
  bot:
    image: kura-booru-next-bot:v0.6.0
    container_name: kura-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kura-internal

  # ---------------------------------------------------------------------------
  # Frontend — Astro SSR
  # ---------------------------------------------------------------------------
  frontend:
    image: kura-booru-next-frontend:v0.6.0
    container_name: kura-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4321:4321"
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4321/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # PostgreSQL 18 — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18-alpine
    container_name: kura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kurabooru}
      POSTGRES_USER: ${POSTGRES_USER:-kura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kura_password}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kura} -d ${POSTGRES_DB:-kurabooru}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7 — Task queue (ARQ) + Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    container_name: kura-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

# =============================================================================
# Volumes — Persistent data
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Network — Internal communication (Caddy on host proxies into this network)
# =============================================================================
networks:
  kura-internal:
    driver: bridge
