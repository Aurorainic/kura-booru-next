# =============================================================================
# Kura Booru — Production Docker Compose (4 containers)
# =============================================================================
# Web: Nitro SSR + REST API + Bot webhook (single Node process)
# Worker: Python gallery-dl + imagehash phash (Redis queue)
# PostgreSQL: Primary database (with pg_trgm)
# Redis: Queue (bare LPUSH/BRPOP) + Cache
#
# Deployment (run from infra/, .env lives at project root):
#   docker compose --env-file ../.env -f docker-compose.yml pull
#   docker compose --env-file ../.env -f docker-compose.yml up -d
#
# Versioning:
#   Custom images are version-pinned by tag (KURA_IMAGE_TAG in .env).
#   A release pushes both :<tag> and :latest to GHCR; deployers pin a tag.
#   Rollback = change KURA_IMAGE_TAG to a prior tag + `pull` + `up -d`.
#   Leave KURA_IMAGE_TAG unset/empty to track :latest (dev/rolling).
#   NOTE: --env-file is REQUIRED — `env_file` below only injects vars into
#   containers; it does NOT feed ${VAR} interpolation in this file.
# =============================================================================

# Registry prefix for custom images. Override KURA_IMAGE_TAG in .env to pin a
# release tag (e.g. v0.7.1); defaults to :latest for local/rolling deploys.

services:
  # ---------------------------------------------------------------------------
  # Web — SSR + REST API + Bot webhook (single Node process)
  # ---------------------------------------------------------------------------
  web:
    image: ${KURA_IMAGE_REGISTRY:-ghcr.io/aurorainic}/kura-booru-web:${KURA_IMAGE_TAG:-latest}
    container_name: kura-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Worker — Python (gallery-dl + imagehash phash)
  # BRPOP kura:jobs → download + phash → LPUSH kura:results:{id}
  # ---------------------------------------------------------------------------
  worker:
    image: ${KURA_IMAGE_REGISTRY:-ghcr.io/aurorainic}/kura-booru-worker:${KURA_IMAGE_TAG:-latest}
    container_name: kura-worker
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kura-internal

  # ---------------------------------------------------------------------------
  # PostgreSQL 18 — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18-alpine
    container_name: kura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kurabooru}
      POSTGRES_USER: ${POSTGRES_USER:-kura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kura_password}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kura} -d ${POSTGRES_DB:-kurabooru}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 8 — Queue (bare LPUSH/BRPOP) + Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    container_name: kura-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

# =============================================================================
# Volumes — Persistent data
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Network — Internal communication (reverse proxy on host forwards into this network)
# =============================================================================
networks:
  kura-internal:
    driver: bridge
