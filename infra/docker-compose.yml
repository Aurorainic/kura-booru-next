# =============================================================================
# Kura Booru Next — Production Docker Compose
# =============================================================================
# Caddy runs on the HOST machine (not in this compose file) and reverse-proxies
# into the Docker network using container names as hostnames.
#
# Usage:
#   docker compose -f infra/docker-compose.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend — FastAPI REST API + ARQ worker
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kura-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Bot — aiogram 3.x Telegram Bot (webhook mode)
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    container_name: kura-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kura-internal

  # ---------------------------------------------------------------------------
  # Frontend — Astro SSR
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: kura-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4321:4321"
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4321/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: kura-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: kurabooru
      POSTGRES_USER: ${POSTGRES_USER:-kura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kura_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kura} -d kurabooru"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7 — Task queue (ARQ) + Cache backend for Caddy Souin
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kura-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: kura-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - kura-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# =============================================================================
# Volumes — Persistent data
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# =============================================================================
# Network — Internal communication (Caddy on host proxies into this network)
# =============================================================================
networks:
  kura-internal:
    driver: bridge