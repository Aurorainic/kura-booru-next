# imgproxy spike: disposable MinIO (S3 stand-in) + imgproxy.
# Mirrors the production shape: web app → /i/ proxy → S3_EXTERNAL_URL,
# here replaced by imgproxy → MinIO source with signed URLs.
#
# Usage: ./run.sh   (or: docker compose up -d --wait && ./seed.sh && node sign.mjs)
services:
  minio:
    image: minio/minio:latest
    container_name: kura-spike-imgproxy-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: spike
      MINIO_ROOT_PASSWORD: spikepass
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: kura-spike-imgproxy-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./fixtures:/fixtures:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 spike spikepass &&
      mc mb --ignore-existing local/kura &&
      mc anonymous set download local/kura &&
      mc cp /fixtures/test.jpg local/kura/posts/test.jpg &&
      echo SEEDED
      "

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: kura-spike-imgproxy
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      # --- CVE-2025-24354 hardening (SSRF) ---
      # Loopback/link-local sources blocked (default since v3.28, set explicitly).
      IMGPROXY_ALLOW_LOOPBACK_SOURCE_ADDRESSES: "false"
      # Private (RFC1918) must stay allowed: MinIO lives on the docker bridge.
      IMGPROXY_ALLOW_PRIVATE_SOURCE_ADDRESSES: "true"
      # Strongest guard: only our bucket prefix is a legal source at all.
      # (v4 renamed IMGPROXY_ALLOWED_SOURCE_URL_PREFIXES → IMGPROXY_ALLOWED_SOURCES)
      IMGPROXY_ALLOWED_SOURCES: "http://minio:9000/kura/"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"          # megapixels, sane ceiling
      IMGPROXY_MAX_SRC_FILE_SIZE: "52428800"     # 50MB
      # --- signed URLs only ---
      IMGPROXY_KEY: ${IMGPROXY_KEY_HEX:?set in .env.spike}
      IMGPROXY_SALT: ${IMGPROXY_SALT_HEX:?set in .env.spike}
      IMGPROXY_SIGNATURE_SIZE: "32"
