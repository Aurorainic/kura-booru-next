<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #06b6d4, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus {
      border-color: #06b6d4;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #06b6d4, #22d3ee);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    #status.success { color: #34d399; }
    #status.error { color: #f87171; }
  </style>
</head>
<body>
  <h1>Kura Booru Importer</h1>

  <label for="server-url">Server URL</label>
  <input type="url" id="server-url" placeholder="https://kura.example.com" />

  <label for="api-key">API Key</label>
  <input type="password" id="api-key" placeholder="X-Api-Key value" />

  <button id="save-btn">Save</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
