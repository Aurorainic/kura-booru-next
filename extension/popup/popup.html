<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #06b6d4, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus, select:focus { border-color: #06b6d4; }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #06b6d4, #22d3ee);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    button:hover { opacity: 0.9; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    #status.success {
      color: #34d399;
      animation: kura-pop 0.3s ease;
    }
    #status.error { color: #f87171; }
    .hint {
      font-size: 11px;
      color: #64748b;
      margin-top: -8px;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    @keyframes kura-pop {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1>Kura Booru 导入助手</h1>

  <label for="server-url">服务器地址</label>
  <input type="url" id="server-url" placeholder="https://kura.example.com" />

  <label for="api-key">API 密钥 (kb_ext_…)</label>
  <input type="password" id="api-key" placeholder="从 admin 后台生成" />
  <div class="hint">到 Kura 管理后台 → 扩展密钥 → 生成新 Key,把明文粘贴到这里。Key 只显示一次。</div>

  <label for="content-type">内容评级 (默认让服务器自动判定)</label>
  <select id="content-type">
    <option value="auto">自动 (由 Auto-Rating 规则决定)</option>
    <option value="safe">公开 (safe)</option>
    <option value="questionable">敏感 (questionable)</option>
    <option value="explicit">限制 (explicit)</option>
  </select>

  <button id="save-btn">保存</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
