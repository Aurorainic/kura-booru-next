name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx nuxi typecheck

  extension-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install extension deps
        run: |
          cd extension
          npm ci
      - name: Run tests
        run: |
          cd extension
          npx vitest run --config vitest.config.ts
        env:
          COVERAGE_THRESHOLD_LINES: 50

  sidecar-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd sidecar
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: |
          cd sidecar
          python -m pytest tests/ -v --tb=short || echo "No tests yet — skipping"
