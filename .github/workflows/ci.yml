name: CI

on:
  push:
    branches: [main, v0.9.0]
  pull_request:
    branches: [main, v0.9.0]

# Cancel superseded runs on the same ref so a fast push doesn't queue stale jobs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      # postinstall runs `nuxt prepare`, which generates the .nuxt tsconfig refs
      # that `nuxt typecheck` consumes — must succeed for typecheck to be valid.
      - run: npm ci
      - run: npx nuxt typecheck

  extension-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - name: Install extension deps
        run: |
          cd extension
          npm ci
      - name: Run tests
        run: |
          cd extension
          npx vitest run

  sidecar-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd sidecar
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        # Fail loudly if sidecar has no tests yet — a green CI that silently
        # skipped pytest hides real breakage. `--no-header -q` keeps output lean.
        run: |
          cd sidecar
          # exit 5 = "no tests collected"; treat that as a failure here so the
          # absence of tests is visible instead of masquerading as a pass.
          python -m pytest tests/ -v --tb=short

  contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # check.mjs is zero-dependency and imports .ts directly — Node 24's
      # type-stripping runs it without npm ci.
      - run: node server/platform/contract/check.mjs
