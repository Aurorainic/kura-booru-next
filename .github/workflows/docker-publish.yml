name: Build & Push Docker Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: kura-booru-next-backend
            context: backend
            dockerfile: backend/Dockerfile
          - image: kura-booru-next-bot
            context: bot
            dockerfile: bot/Dockerfile
          - image: kura-booru-next-frontend
            context: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lower=$OWNER_LOWER" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ""                        # use default (production) stage
          push: true
          build-args: |
            PUBLIC_GIT_TAG=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lower }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lower }}/${{ matrix.image }}:latest
          provenance: false
          sbom: false
