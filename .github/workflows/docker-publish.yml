name: Build & Push Docker Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: kura-booru-web
            context: .
            dockerfile: Dockerfile
          - image: kura-booru-worker
            context: sidecar
            dockerfile: sidecar/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lower=$OWNER_LOWER" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            KURA_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lower }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lower }}/${{ matrix.image }}:latest
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup-old-images:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image:
          - kura-booru-web
          - kura-booru-worker

    steps:
      - name: Delete old image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.image }}
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
