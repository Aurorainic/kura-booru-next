name: Build & Push Docker Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

# A double-push of two tags should produce two builds, but the same tag
# re-pushed must not race itself into a corrupt manifest. Key on the tag.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Only build tags that look like releases — `v*` already filters on the
    # trigger, but this guards against a tag like `v-test` slipping a throwaway
    # into the registry's :latest. Skip non-release tags without failing the run.
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: kura-booru-web
            context: .
            dockerfile: Dockerfile
          - image: kura-booru-worker
            context: sidecar
            dockerfile: sidecar/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          OWNER_LOWER=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lower=$OWNER_LOWER" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert production build guard
        # 根因守卫: NODE_ENV=production 是 prod 构建开关,缺失 = 静默产出 dev 包
        # (网页含 "nuxt dev"、左下角 dev 角标)。Dockerfile 内也有 RUN test 兜底,
        # 此处提前在 build-push 前失败,日志更清晰且不浪费 GHA 缓存。
        run: |
          grep -q '^ENV NODE_ENV=production' Dockerfile || { \
            echo "FATAL: Dockerfile build stage missing 'ENV NODE_ENV=production'"; \
            echo "Without it, nuxt build ships a dev bundle (page shows 'nuxt dev', dev badge)."; \
            exit 1; }
          echo "OK: Dockerfile pins NODE_ENV=production in build stage"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            KURA_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lower }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner_lower }}/${{ matrix.image }}:latest
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup-old-images:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ always() && needs.build-and-push.result == 'success' }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image:
          - kura-booru-web
          - kura-booru-worker

    steps:
      - name: Delete old untagged image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.image }}
          package-type: container
          min-versions-to-keep: 3
          # Only purge UN-tagged versions (digest-only leftovers from re-tags
          # and cache pushes). Tagged versions are kept regardless of age so a
          # still-pulled release tag is never deleted out from under a deploy.
          delete-only-untagged-versions: true
