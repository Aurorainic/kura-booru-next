<svg xmlns="http://www.w3.org/2000/svg" viewBox="131 232 180 240" width="512" height="512">
  <defs>
    <radialGradient id="fog" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.3"/>
    </radialGradient>

    <linearGradient id="sakura" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8C8DC"/>
      <stop offset="100%" stop-color="#FAD6E3"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8D8EA"/>
      <stop offset="100%" stop-color="#C5E8F5"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9E79F"/>
      <stop offset="100%" stop-color="#FCEFB8"/>
    </linearGradient>

    <rect id="card-s" x="-42" y="-115" width="84" height="130" rx="12"/>
    <rect id="card-m" x="-46" y="-125" width="92" height="150" rx="12"/>
    <rect id="card-l" x="-50" y="-140" width="100" height="160" rx="14"/>

    <rect id="frame-s" x="-36" y="-109" width="72" height="118" rx="8" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
    <rect id="frame-m" x="-40" y="-119" width="80" height="138" rx="8" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
    <rect id="frame-l" x="-44" y="-134" width="88" height="148" rx="10" fill="none" stroke="white" stroke-width="2.5" opacity="0.7"/>
  </defs>

  <!-- 卡1：樱花粉，300°，小号 -->
  <g transform="translate(250, 410) rotate(300)">
    <use href="#card-s" fill="url(#sakura)"/>
    <use href="#frame-s"/>
    <g transform="translate(0, -80)" opacity="0.5">
      <circle cx="0" cy="-6" r="4" fill="white"/>
      <circle cx="5.7" cy="-1.9" r="4" fill="white"/>
      <circle cx="3.5" cy="4.9" r="4" fill="white"/>
      <circle cx="-3.5" cy="4.9" r="4" fill="white"/>
      <circle cx="-5.7" cy="-1.9" r="4" fill="white"/>
      <circle cx="0" cy="0" r="2.5" fill="white"/>
    </g>
    <use href="#card-s" fill="url(#fog)"/>
  </g>

  <!-- 卡2：天蓝，330°，中号 -->
  <g transform="translate(256, 400) rotate(330)">
    <use href="#card-m" fill="url(#sky)"/>
    <use href="#frame-m"/>
    <path d="M-22 -80 Q-11 -90 0 -80 Q11 -70 22 -80" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M-18 -65 Q-9 -75 0 -65 Q9 -55 18 -65" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
    <use href="#card-m" fill="url(#fog)"/>
  </g>

  <!-- 卡3：暖阳光，360°，大号，最前 -->
  <g transform="translate(262, 390) rotate(0)">
    <use href="#card-l" fill="url(#sun)"/>
    <use href="#frame-l"/>
    <path d="M22 -118 L22 -112 M19 -115 L25 -115" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <circle cx="0" cy="-85" r="8" fill="white" opacity="0.5"/>
    <circle cx="-28" cy="-40" r="3" fill="white" opacity="0.35"/>
    <use href="#card-l" fill="url(#fog)"/>
  </g>
</svg>
