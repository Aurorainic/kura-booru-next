<!doctype html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="管理员登录 — Kura Booru" />
  <meta name="theme-color" content="#7DD3C0" />
  <title>登录 — Kura Booru</title>
  <script is:inline>
    (function() {
      const stored = localStorage.getItem('kura-theme-preference');
      let resolved;
      if (stored === 'light' || stored === 'dark') {
        resolved = stored;
      } else {
        resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.classList.remove('light', 'dark');
      document.documentElement.classList.add(resolved);
    })();
  </script>
  <style>
    /* === Design Tokens — Modern Minimal + Kura Brand === */
    :root {
      /* Surfaces */
      --bg:          oklch(99% 0.002 240);
      --surface:     oklch(100% 0 0);
      --surface-alt: oklch(97% 0.003 240);

      /* Text */
      --fg:    oklch(18% 0.012 250);
      --muted: oklch(54% 0.012 250);

      /* Borders & Dividers */
      --border:       oklch(92% 0.005 250);
      --border-hover: oklch(82% 0.008 250);

      /* Brand Accent — single color, not gradient */
      --accent:        oklch(72% 0.12 175);
      --accent-hover:  oklch(65% 0.14 175);
      --accent-subtle: oklch(95% 0.03 175);

      /* Status */
      --success: oklch(65% 0.18 145);
      --warning: oklch(75% 0.16 85);
      --danger:  oklch(62% 0.2 25);

      /* Shadows */
      --shadow-sm:  0 1px 2px oklch(0% 0 0 / 0.04);
      --shadow-md:  0 4px 12px oklch(0% 0 0 / 0.06);
      --shadow-lg:  0 12px 32px oklch(0% 0 0 / 0.08);

      /* Typography */
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      --font-mono:    ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace;

      /* Spacing scale */
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --space-3xl: 4rem;

      /* Radii */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --radius-full: 9999px;

      /* Transitions */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 120ms;
      --duration-normal: 200ms;
      --duration-slow: 350ms;

      /* Layout */
      --nav-height: 56px;
      --content-max: 1400px;
    }

    .dark {
      --bg:          oklch(14% 0.008 260);
      --surface:     oklch(18% 0.01 260);
      --surface-alt: oklch(22% 0.012 260);
      --fg:          oklch(92% 0.008 250);
      --muted:       oklch(58% 0.012 250);
      --border:      oklch(28% 0.01 260);
      --border-hover:oklch(38% 0.014 260);
      --accent:      oklch(72% 0.12 175);
      --accent-hover:oklch(78% 0.14 175);
      --accent-subtle:oklch(22% 0.04 175);
      --shadow-sm:  0 1px 2px oklch(0% 0 0 / 0.2);
      --shadow-md:  0 4px 12px oklch(0% 0 0 / 0.3);
      --shadow-lg:  0 12px 32px oklch(0% 0 0 / 0.4);
    }

    /* === Reset & Base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
      font-size: clamp(14px, 0.875rem + 0.25vw, 16px);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background var(--duration-slow) var(--ease-out), color var(--duration-slow) var(--ease-out);
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    img { display: block; max-width: 100%; }
    ul, ol { list-style: none; }

    /* === Focus === */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    /* === Selection === */
    ::selection {
      background: var(--accent);
      color: var(--bg);
    }

    /* === Scrollbar === */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* === Utility Classes === */
    .container {
      width: 100%;
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 0 var(--space-lg);
    }

    .gradient-text {
      background: linear-gradient(135deg, oklch(72% 0.12 175), oklch(78% 0.1 200));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* === Navigation === */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-height);
      border-bottom: 1px solid var(--border);
      background: oklch(14% 0.008 260 / 0.8);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      transition: background var(--duration-slow) var(--ease-out), border-color var(--duration-slow) var(--ease-out);
    }

    :root:not(.dark) .nav {
      background: oklch(99% 0.002 240 / 0.85);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      gap: var(--space-md);
    }

    .nav-brand {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-family: var(--font-display);
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    .nav-brand-name {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .nav-brand-sub {
      font-size: 1.25rem;
      font-weight: 300;
      color: var(--muted);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      transition: color var(--duration-fast), background var(--duration-fast);
      white-space: nowrap;
      position: relative;
    }

    .nav-link:hover {
      color: var(--fg);
      background: var(--accent-subtle);
    }

    .nav-link.active {
      color: var(--accent);
    }

    .nav-link svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 4px;
      height: 1.5px;
      background: var(--accent);
      border-radius: 1px;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.25s var(--ease-out);
    }

    .nav-link:hover::after,
    .nav-link.active::after {
      transform: scaleX(1);
    }

    .nav-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* Theme toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      transition: background var(--duration-fast);
    }

    .theme-toggle:hover {
      background: var(--accent-subtle);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
      color: var(--muted);
      transition: color var(--duration-fast),
                  transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .theme-toggle:hover svg {
      color: var(--fg);
      transform: scale(1.1);
    }

    .theme-toggle:active svg {
      transform: scale(0.85);
    }

    .theme-toggle.spin svg {
      transform: rotate(360deg) scale(1.1);
    }

    /* Mobile menu button */
    .mobile-menu-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
    }

    .mobile-menu-btn:hover { background: var(--accent-subtle); }
    .mobile-menu-btn svg { width: 20px; height: 20px; color: var(--muted); }

    /* === Noise Texture Overlay === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
    }
    .dark body::before { opacity: 0.03; }

    /* === Page Entrance Animation === */
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    main { animation: pageIn 0.5s var(--ease-out) both; }

    /* === Card Entrance Animation === */
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* === Login Page Layout === */
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl) var(--space-lg);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: var(--space-2xl) var(--space-xl);
      animation: cardIn 0.5s var(--ease-out) 0.1s both;
    }

    /* === Brand Icon / Illustration === */
    .login-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-lg);
      border-radius: var(--radius-lg);
      background: var(--accent-subtle);
      color: var(--accent);
    }

    .login-icon svg {
      width: 32px;
      height: 32px;
    }

    /* === Login Title === */
    .login-title {
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-xs);
    }

    .login-subtitle {
      font-size: 0.8125rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    /* === Form Fields === */
    .form-group {
      margin-bottom: var(--space-md);
    }

    .form-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: var(--space-xs);
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      font-size: 0.9375rem;
      font-family: var(--font-body);
      transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
    }

    .form-input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-subtle);
    }

    /* Password show/hide toggle */
    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      color: var(--muted);
      transition: color var(--duration-fast), background var(--duration-fast);
    }

    .password-toggle:hover {
      color: var(--fg);
      background: var(--accent-subtle);
    }

    .password-toggle svg {
      width: 16px;
      height: 16px;
    }

    .form-input[type="password"] ~ .password-toggle .icon-eye-off,
    .form-input[type="text"] ~ .password-toggle .icon-eye {
      display: none;
    }

    .form-input[type="password"] ~ .password-toggle .icon-eye {
      display: block;
    }

    .form-input[type="text"] ~ .password-toggle .icon-eye-off {
      display: block;
    }

    .form-input.has-toggle {
      padding-right: 44px;
    }

    /* === Login Button === */
    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 20px;
      margin-top: var(--space-lg);
      border-radius: var(--radius-md);
      background: var(--accent);
      color: oklch(14% 0.008 260);
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: background var(--duration-fast), transform 0.1s ease, box-shadow var(--duration-fast);
    }

    .login-btn:hover {
      background: var(--accent-hover);
    }

    .login-btn:active {
      transform: scale(0.97);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Loading spinner */
    .login-btn .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid oklch(14% 0.008 260 / 0.3);
      border-top-color: oklch(14% 0.008 260);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .login-btn.loading .spinner {
      display: block;
    }

    .login-btn.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* === Error Message === */
    .login-error {
      margin-top: var(--space-md);
      padding: 10px 14px;
      border-radius: var(--radius-md);
      background: oklch(62% 0.2 25 / 0.1);
      border: 1px solid oklch(62% 0.2 25 / 0.2);
      color: var(--danger);
      font-size: 0.8125rem;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .login-error svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .login-error.visible {
      display: flex;
      animation: errorSlideDown 0.3s var(--ease-out) both;
    }

    @keyframes errorSlideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
        max-height: 0;
        padding-top: 0;
        padding-bottom: 0;
        margin-top: 0;
      }
      to {
        opacity: 1;
        transform: translateY(0);
        max-height: 60px;
        padding-top: 10px;
        padding-bottom: 10px;
        margin-top: var(--space-md);
      }
    }

    /* === Footer === */
    .footer {
      border-top: 1px solid var(--border);
      padding: var(--space-xl) 0;
      margin-top: auto;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .footer-link {
      font-weight: 500;
      transition: opacity var(--duration-fast);
    }

    .footer-link:hover { opacity: 0.7; }

    .footer-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      margin-left: 8px;
    }

    /* === Responsive === */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .mobile-menu-btn { display: flex; }
      .container { padding: 0 var(--space-md); }
      .login-card {
        max-width: none;
        border-radius: var(--radius-lg);
        padding: var(--space-xl) var(--space-lg);
      }
      .login-wrapper {
        padding: var(--space-lg) var(--space-md);
      }
    }

    @media (min-width: 769px) {
      .mobile-menu-btn { display: none; }
    }

    /* === Reduced Motion === */
    @media (prefers-reduced-motion: reduce) {
      main, .login-card, .login-error.visible {
        animation: none;
      }
      .theme-toggle svg,
      .login-btn,
      .form-input,
      .password-toggle {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-brand-name gradient-text">Kura</span>
        <span class="nav-brand-sub">Booru</span>
      </a>

      <div class="nav-links">
        <a href="/" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/></svg>
          画廊
        </a>
        <a href="/search" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
          搜索
        </a>
        <a href="/tags" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.34a18.095 18.095 0 005.223-5.223c.534-.827.36-1.908-.34-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/><path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z"/></svg>
          标签
        </a>

        <div class="nav-divider"></div>

        <button class="theme-toggle" id="theme-toggle" title="切换主题">
          <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 9.75C3 14.142 6.858 18 11.25 18c1.488 0 2.885-.334 4.134-.932a9.717 9.717 0 006.368-2.066z"/></svg>
        </button>
      </div>

      <!-- Mobile menu button -->
      <button class="mobile-menu-btn" id="mobile-menu-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <main class="login-wrapper">
    <div class="login-card">
      <!-- Brand icon -->
      <div class="login-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
      </div>

      <!-- Title -->
      <h1 class="login-title">管理员登录</h1>
      <p class="login-subtitle">请输入凭据以访问管理面板</p>

      <!-- Login form -->
      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="username">用户名</label>
          <div class="form-input-wrapper">
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="输入用户名"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <div class="form-input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input has-toggle"
              placeholder="输入密码"
              autocomplete="current-password"
              required
            />
            <button type="button" class="password-toggle" id="password-toggle" aria-label="显示密码">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          <span class="btn-text">登录</span>
          <span class="spinner"></span>
        </button>
      </form>

      <!-- Error message area -->
      <div class="login-error" id="login-error">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
        <span id="error-text">用户名或密码错误</span>
      </div>
    </div>
  </main>

  </footer>

  <script>
    // Theme toggle — with spin animation
    (function() {
      var btn = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon-moon');
      var sunPath = 'M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z';
      var moonPath = 'M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 9.75C3 14.142 6.858 18 11.25 18c1.488 0 2.885-.334 4.134-.932a9.717 9.717 0 006.368-2.066z';
      var monitorPath = 'M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25A2.25 2.25 0 015.25 3h13.5A2.25 2.25 0 0121 5.25z';

      var states = ['auto', 'light', 'dark'];
      var current = localStorage.getItem('kura-theme-preference') || 'auto';

      function updateIcon() {
        var p = current;
        if (p === 'auto') icon.querySelector('path').setAttribute('d', monitorPath);
        else if (p === 'light') icon.querySelector('path').setAttribute('d', sunPath);
        else icon.querySelector('path').setAttribute('d', moonPath);
        btn.title = '主题：' + (p === 'auto' ? '自动' : p === 'light' ? '浅色' : '深色');
      }

      function applyTheme(t) {
        var resolved = t;
        if (t === 'auto') resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(resolved);
      }

      btn.addEventListener('click', function() {
        btn.classList.add('spin');
        setTimeout(function() { btn.classList.remove('spin'); }, 500);

        current = states[(states.indexOf(current) + 1) % states.length];
        localStorage.setItem('kura-theme-preference', current);
        applyTheme(current);
        setTimeout(updateIcon, 200);
      });

      updateIcon();
    })();

    // Password show/hide toggle
    (function() {
      var toggle = document.getElementById('password-toggle');
      var input = document.getElementById('password');
      if (!toggle || !input) return;

      toggle.addEventListener('click', function() {
        var isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        toggle.setAttribute('aria-label', isPassword ? '隐藏密码' : '显示密码');
      });
    })();

    // Login form — submit handler with loading state and simulated error
    (function() {
      var form = document.getElementById('login-form');
      var btn = document.getElementById('login-btn');
      var errorEl = document.getElementById('login-error');
      var errorText = document.getElementById('error-text');
      if (!form || !btn || !errorEl) return;

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        // Hide previous error
        errorEl.classList.remove('visible');

        // Enter loading state
        btn.classList.add('loading');
        btn.disabled = true;

        // Simulate login attempt (2s delay, then show error)
        setTimeout(function() {
          btn.classList.remove('loading');
          btn.disabled = false;

          // Show simulated error
          errorText.textContent = '用户名或密码错误，请重试';
          errorEl.classList.add('visible');
        }, 2000);
      });
    })();
  </script>
