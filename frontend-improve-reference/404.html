<!doctype html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="页面未找到 — Kura Booru" />
  <meta name="theme-color" content="#7DD3C0" />
  <title>404 — Kura Booru</title>
  <script is:inline>
    (function() {
      const stored = localStorage.getItem('kura-theme-preference');
      let resolved;
      if (stored === 'light' || stored === 'dark') {
        resolved = stored;
      } else {
        resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.classList.remove('light', 'dark');
      document.documentElement.classList.add(resolved);
    })();
  </script>
  <style>
    /* === Design Tokens — Modern Minimal + Kura Brand === */
    :root {
      --bg:          oklch(99% 0.002 240);
      --surface:     oklch(100% 0 0);
      --surface-alt: oklch(97% 0.003 240);
      --fg:    oklch(18% 0.012 250);
      --muted: oklch(54% 0.012 250);
      --border:       oklch(92% 0.005 250);
      --border-hover: oklch(82% 0.008 250);
      --accent:        oklch(72% 0.12 175);
      --accent-hover:  oklch(65% 0.14 175);
      --accent-subtle: oklch(95% 0.03 175);
      --success: oklch(65% 0.18 145);
      --warning: oklch(75% 0.16 85);
      --danger:  oklch(62% 0.2 25);
      --tag-artist:     oklch(70% 0.16 55);
      --tag-character:  oklch(68% 0.16 340);
      --tag-copyright:  oklch(62% 0.16 290);
      --tag-general:    oklch(72% 0.12 175);
      --tag-meta:       oklch(60% 0.01 250);
      --shadow-sm:  0 1px 2px oklch(0% 0 0 / 0.04);
      --shadow-md:  0 4px 12px oklch(0% 0 0 / 0.06);
      --shadow-lg:  0 12px 32px oklch(0% 0 0 / 0.08);
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      --font-mono:    ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --radius-full: 9999px;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 120ms;
      --duration-normal: 200ms;
      --duration-slow: 350ms;
      --nav-height: 56px;
      --content-max: 1400px;
    }

    .dark {
      --bg:          oklch(14% 0.008 260);
      --surface:     oklch(18% 0.01 260);
      --surface-alt: oklch(22% 0.012 260);
      --fg:          oklch(92% 0.008 250);
      --muted:       oklch(58% 0.012 250);
      --border:      oklch(28% 0.01 260);
      --border-hover:oklch(38% 0.014 260);
      --accent:      oklch(72% 0.12 175);
      --accent-hover:oklch(78% 0.14 175);
      --accent-subtle:oklch(22% 0.04 175);
      --shadow-sm:  0 1px 2px oklch(0% 0 0 / 0.2);
      --shadow-md:  0 4px 12px oklch(0% 0 0 / 0.3);
      --shadow-lg:  0 12px 32px oklch(0% 0 0 / 0.4);
    }

    /* === Reset & Base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
      font-size: clamp(14px, 0.875rem + 0.25vw, 16px);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background var(--duration-slow) var(--ease-out), color var(--duration-slow) var(--ease-out);
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    img { display: block; max-width: 100%; }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    ::selection {
      background: var(--accent);
      color: var(--bg);
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    .container {
      width: 100%;
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .gradient-text {
      background: linear-gradient(135deg, oklch(72% 0.12 175), oklch(78% 0.1 200));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* === Navigation === */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-height);
      border-bottom: 1px solid var(--border);
      background: oklch(14% 0.008 260 / 0.8);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      transition: background var(--duration-slow) var(--ease-out), border-color var(--duration-slow) var(--ease-out);
    }

    :root:not(.dark) .nav {
      background: oklch(99% 0.002 240 / 0.85);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      gap: 1rem;
    }

    .nav-brand {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-family: var(--font-display);
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    .nav-brand-name {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .nav-brand-sub {
      font-size: 1.25rem;
      font-weight: 300;
      color: var(--muted);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      transition: color var(--duration-fast), background var(--duration-fast);
      white-space: nowrap;
      position: relative;
    }

    .nav-link:hover {
      color: var(--fg);
      background: var(--accent-subtle);
    }

    .nav-link svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 4px;
      height: 1.5px;
      background: var(--accent);
      border-radius: 1px;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.25s var(--ease-out);
    }

    .nav-link:hover::after {
      transform: scaleX(1);
    }

    .nav-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* Theme toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      transition: background var(--duration-fast);
    }

    .theme-toggle:hover {
      background: var(--accent-subtle);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
      color: var(--muted);
      transition: color var(--duration-fast), transform var(--duration-normal);
    }

    .theme-toggle:hover svg {
      color: var(--fg);
      transform: scale(1.1);
    }

    /* === 404 Content === */
    .error-content {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      text-align: center;
      overflow: hidden;
    }

    /* Decorative glow circles */
    .glow-circle {
      position: absolute;
      border-radius: 50%;
      background: oklch(72% 0.12 175 / 0.06);
      filter: blur(80px);
      pointer-events: none;
    }

    .dark .glow-circle {
      background: oklch(72% 0.12 175 / 0.08);
    }

    .glow-circle-1 {
      width: 300px;
      height: 300px;
      top: 15%;
      left: 20%;
    }

    .glow-circle-2 {
      width: 250px;
      height: 250px;
      top: 30%;
      right: 18%;
    }

    .glow-circle-3 {
      width: 200px;
      height: 200px;
      bottom: 25%;
      left: 45%;
    }

    .error-number {
      font-family: var(--font-display);
      font-size: clamp(6rem, 18vw, 12rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      position: relative;
      z-index: 1;
    }

    .error-subtitle {
      font-family: var(--font-display);
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 1rem;
      position: relative;
      z-index: 1;
    }

    .error-desc {
      font-size: 0.9375rem;
      color: var(--muted);
      margin-top: 0.75rem;
      max-width: 360px;
      position: relative;
      z-index: 1;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 2rem;
      padding: 10px 24px;
      border-radius: var(--radius-md);
      background: var(--accent);
      color: oklch(14% 0.008 260);
      font-size: 0.9375rem;
      font-weight: 600;
      transition: background var(--duration-fast), transform 0.1s ease;
      position: relative;
      z-index: 1;
    }

    .error-btn:hover {
      background: var(--accent-hover);
    }

    .error-btn:active {
      transform: scale(0.97);
    }

    .error-btn svg {
      width: 18px;
      height: 18px;
    }

    /* === Footer === */
    .footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 0;
      margin-top: auto;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .footer-link {
      font-weight: 500;
      transition: opacity var(--duration-fast);
    }

    .footer-link:hover { opacity: 0.7; }

    .footer-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      margin-left: 8px;
    }

    /* === Responsive === */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .container { padding: 0 1rem; }
      .error-content { padding: 3rem 1rem; }
      .glow-circle-1 { width: 200px; height: 200px; left: 10%; }
      .glow-circle-2 { width: 160px; height: 160px; right: 5%; }
      .glow-circle-3 { width: 140px; height: 140px; left: 35%; }
    }

    /* === Noise texture overlay === */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.018;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
    }
    .dark body::before { opacity: 0.03; }

    /* === Entrance animations === */
    @keyframes numberIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-number {
      animation: numberIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .error-subtitle {
      animation: slideUp 0.5s var(--ease-out) 0.15s both;
    }

    .error-btn {
      animation: slideUp 0.5s var(--ease-out) 0.3s both;
    }

    .error-desc {
      animation: slideUp 0.5s var(--ease-out) 0.15s both;
    }

    /* === Theme toggle spin === */
    .theme-toggle svg {
      transition: color var(--duration-fast),
                  transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .theme-toggle:active svg {
      transform: scale(0.85);
    }
    .theme-toggle.spin svg {
      transform: rotate(360deg) scale(1.1);
    }

    /* === Glow circle subtle animation === */
    @keyframes glowPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .glow-circle-1 {
      animation: glowPulse 6s ease-in-out infinite;
    }
    .glow-circle-2 {
      animation: glowPulse 6s ease-in-out 2s infinite;
    }
    .glow-circle-3 {
      animation: glowPulse 6s ease-in-out 4s infinite;
    }

    /* === Reduced motion === */
    @media (prefers-reduced-motion: reduce) {
      .error-number,
      .error-subtitle,
      .error-desc,
      .error-btn,
      .glow-circle-1,
      .glow-circle-2,
      .glow-circle-3 {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-brand-name gradient-text">Kura</span>
        <span class="nav-brand-sub">Booru</span>
      </a>

      <div class="nav-links">
        <a href="/" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/></svg>
          画廊
        </a>
        <a href="/search" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
          搜索
        </a>
        <a href="/tags" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.34a18.095 18.095 0 005.223-5.223c.534-.827.36-1.908-.34-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/></svg>
          标签
        </a>

        <div class="nav-divider"></div>

        <button class="theme-toggle" id="theme-toggle" title="切换主题">
          <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 9.75C3 14.142 6.858 18 11.25 18c1.488 0 2.885-.334 4.134-.932a9.717 9.717 0 006.368-2.066z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- 404 Content -->
  <main class="error-content">
    <!-- Decorative glow circles -->
    <div class="glow-circle glow-circle-1"></div>
    <div class="glow-circle glow-circle-2"></div>
    <div class="glow-circle glow-circle-3"></div>

    <div class="error-number gradient-text">404</div>
    <h1 class="error-subtitle">页面未找到</h1>
    <p class="error-desc">你访问的页面不存在或已被移除</p>
    <a href="/" class="error-btn" id="home-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
      返回首页
    </a>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <span>
        <a href="https://gitea.lainns.xyz/lainsaka/kura-booru-next" target="_blank" rel="noopener noreferrer" class="footer-link gradient-text">Kura Booru (Next)</a>
        <span class="footer-tag">v1.2.0</span>
      </span>
      <span>个人动漫插画收藏</span>
    </div>
  </footer>

  <script>
    // Theme toggle — with spin animation
    (function() {
      var btn = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      var sunPath = 'M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z';
      var moonPath = 'M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 9.75C3 14.142 6.858 18 11.25 18c1.488 0 2.885-.334 4.134-.932a9.717 9.717 0 006.368-2.066z';
      var monitorPath = 'M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25A2.25 2.25 0 015.25 3h13.5A2.25 2.25 0 0121 5.25z';

      var states = ['auto', 'light', 'dark'];
      var current = localStorage.getItem('kura-theme-preference') || 'auto';

      function updateIcon() {
        if (current === 'auto') icon.querySelector('path').setAttribute('d', monitorPath);
        else if (current === 'light') icon.querySelector('path').setAttribute('d', sunPath);
        else icon.querySelector('path').setAttribute('d', moonPath);
        btn.title = '主题：' + (current === 'auto' ? '自动' : current === 'light' ? '浅色' : '深色');
      }

      function applyTheme(t) {
        var resolved = t;
        if (t === 'auto') resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(resolved);
      }

      btn.addEventListener('click', function() {
        btn.classList.add('spin');
        setTimeout(function() { btn.classList.remove('spin'); }, 500);
        current = states[(states.indexOf(current) + 1) % states.length];
        localStorage.setItem('kura-theme-preference', current);
        applyTheme(current);
        setTimeout(updateIcon, 200);
      });

      updateIcon();
    })();
  </script>

</html>
